<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" width="360" height="72" role="img" aria-label="Blockwerk Orange">
  <!-- Bildmarke: vier Blöcke, der obere wird „eingesetzt“ -->
  <g transform="translate(8 12)">
    <rect x="0" y="0" width="18" height="18" rx="4.5" fill="#ea580c"/>
    <rect x="0" y="22" width="18" height="18" rx="4.5" fill="#ea580c"/>
    <rect x="22" y="22" width="18" height="18" rx="4.5" fill="#ea580c"/>
    <rect x="24" y="-2" width="18" height="18" rx="4.5" fill="#fbbf24"/>
  </g>
  <!-- Wortmarke -->
  <text x="70" y="38" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="-0.5" fill="#2b1d12">Blockwerk</text>
  <text x="70" y="58" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="4" fill="#ea580c">ORANGE</text>
</svg>
